<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmaBot SUS — DAF Trindade-GO</title>
<style>
:root {
  --verde:#0B6B50;--verde-m:#1A9E75;--verde-bg:#E2F5EE;--verde-borda:#A8DFCA;
  --azul:#1655A0;--azul-bg:#E5F0FB;
  --ambar:#B8720F;--ambar-bg:#FDF0D8;--ambar-borda:#F5C97A;
  --vermelho:#9E2A2A;--vermelho-bg:#FCEAEA;--vermelho-borda:#F0A0A0;
  --roxo:#4F42B5;--roxo-bg:#EEEDFD;
  --cinza:#5A5956;--cinza-bg:#F2F0EB;--cinza-borda:#D5D2C8;
  --texto:#1E1D1B;--texto-sec:#5A5956;--texto-ter:#908D86;
  --fundo:#F6F4EF;--branco:#FFFFFF;--borda:#D8D5CE;
  --sombra:0 2px 8px rgba(0,0,0,.08);--r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--fundo);color:var(--texto);font-size:14px;line-height:1.5;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* LOGIN */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0B6B50 0%,#1655A0 100%);}
.login-wrap{background:var(--branco);border-radius:16px;padding:44px 40px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.login-icon{width:48px;height:48px;background:var(--verde-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.login-brand h1{font-size:17px;font-weight:800;}
.login-brand p{font-size:12px;color:var(--texto-sec);}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--texto-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--borda);border-radius:var(--r-sm);font-size:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--verde-m);}
.fg{margin-bottom:13px;}
.btn-login-submit{width:100%;padding:13px;background:var(--verde);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;margin-top:6px;}
.btn-login-submit:hover{background:var(--verde-m);}
.err-txt{color:var(--vermelho);font-size:12px;margin-top:8px;display:none;}

/* SHELL */
#tela-app{display:none;}
.topbar{background:var(--verde);color:#fff;height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.topbar-l{display:flex;align-items:center;gap:10px;}
.topbar-nome{font-weight:800;font-size:15px;}
.topbar-ubs{font-size:11px;opacity:.8;}
.btn-sair{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 13px;border-radius:var(--r-sm);font-size:12px;font-weight:600;}
.btn-sair:hover{background:rgba(255,255,255,.25);}
.app-body{display:flex;min-height:calc(100vh - 54px);}
.sidebar{width:210px;background:var(--branco);border-right:1px solid var(--borda);padding:12px 0;flex-shrink:0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;}
.nav-sec{font-size:10px;font-weight:700;color:var(--texto-ter);text-transform:uppercase;letter-spacing:.6px;padding:10px 16px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;font-weight:500;color:var(--texto-sec);border:none;background:none;width:100%;text-align:left;position:relative;transition:background .15s;}
.nav-item:hover{background:var(--cinza-bg);color:var(--texto);}
.nav-item.ativo{background:var(--verde-bg);color:var(--verde);font-weight:700;}
.nav-item.ativo::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--verde);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--ambar-bg);color:var(--ambar);border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700;}
.nav-badge.r{background:var(--vermelho-bg);color:var(--vermelho);}
.main{flex:1;padding:24px;min-width:0;max-width:100%;}
.secao{display:none;}
.secao.ativa{display:block;}

/* DASH */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.dc{background:var(--branco);border-radius:var(--r);padding:18px;border:1px solid var(--borda);border-top:3px solid var(--verde-m);}
.dc.a{border-top-color:var(--ambar);}
.dc.r{border-top-color:var(--vermelho);}
.dc.az{border-top-color:var(--azul);}
.dc.ro{border-top-color:var(--roxo);}
.dc-lbl{font-size:11px;font-weight:600;color:var(--texto-sec);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.dc-num{font-size:28px;font-weight:800;color:var(--verde);}
.dc.a .dc-num{color:var(--ambar);}
.dc.r .dc-num{color:var(--vermelho);}
.dc.az .dc-num{color:var(--azul);}
.dc.ro .dc-num{color:var(--roxo);}
.dc-sub{font-size:11px;color:var(--texto-ter);margin-top:4px;}

/* CARD */
.card{background:var(--branco);border-radius:var(--r);padding:20px;border:1px solid var(--borda);margin-bottom:16px;}
.card-tit{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.two-col{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 15px;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:background .15s;}
.btn-v{background:var(--verde);color:#fff;} .btn-v:hover{background:var(--verde-m);}
.btn-c{background:var(--cinza-bg);color:var(--texto);} .btn-c:hover{background:var(--cinza-borda);}
.btn-az{background:var(--azul-bg);color:var(--azul);}
.btn-am{background:var(--ambar-bg);color:var(--ambar);}
.btn-ve{background:var(--vermelho-bg);color:var(--vermelho);}
.btn-ro{background:var(--roxo-bg);color:var(--roxo);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-full{width:100%;justify-content:center;padding:12px;}

/* LISTA */
.il{border:1px solid var(--borda);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;background:var(--branco);transition:border-color .15s;}
.il:hover{border-color:var(--verde-m);}
.av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.av-v{background:var(--verde-bg);color:var(--verde);}
.av-a{background:var(--ambar-bg);color:var(--ambar);}
.av-r{background:var(--vermelho-bg);color:var(--vermelho);}
.av-ro{background:var(--roxo-bg);color:var(--roxo);}
.av-az{background:var(--azul-bg);color:var(--azul);}
.ii{flex:1;min-width:0;}
.in{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.is{font-size:12px;color:var(--texto-sec);margin-top:1px;}
.ia{display:flex;gap:5px;flex-shrink:0;}
.vazia{text-align:center;padding:32px;color:var(--texto-sec);font-size:13px;}
.vazia em{font-size:26px;display:block;margin-bottom:8px;font-style:normal;}

/* BADGE */
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bv{background:var(--verde-bg);color:var(--verde);}
.ba{background:var(--ambar-bg);color:var(--ambar);}
.br{background:var(--vermelho-bg);color:var(--vermelho);}
.bc{background:var(--cinza-bg);color:var(--cinza);}

/* BEERS */
.beers-box{background:var(--vermelho-bg);border:1.5px solid var(--vermelho-borda);border-radius:var(--r);padding:13px;margin-top:10px;}
.beers-tit{font-weight:700;color:var(--vermelho);font-size:13px;margin-bottom:6px;}
.beers-li{font-size:12px;color:var(--vermelho);margin-bottom:3px;padding-left:12px;position:relative;}
.beers-li::before{content:'•';position:absolute;left:2px;}
.interacao-box{background:var(--ambar-bg);border:1.5px solid var(--ambar-borda);border-radius:var(--r);padding:13px;margin-top:8px;}
.interacao-tit{font-weight:700;color:var(--ambar);font-size:13px;margin-bottom:6px;}
.interacao-li{font-size:12px;color:var(--ambar);margin-bottom:3px;padding-left:14px;position:relative;}
.interacao-li::before{content:'⚠';position:absolute;left:0;font-size:10px;}

/* MED CHIP */
.med-chip{display:inline-flex;align-items:center;gap:4px;background:var(--verde-bg);color:var(--verde);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;margin:2px;}
.med-chip-r{background:var(--vermelho-bg);color:var(--vermelho);}
.med-chip-a{background:var(--ambar-bg);color:var(--ambar);}

/* CHAT */
.conv-item{border:1.5px solid var(--borda);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .15s;}
.conv-item:hover{border-color:var(--verde-m);}
.conv-item.aberta{border-color:var(--verde);}
.conv-header{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--branco);}
.conv-info{flex:1;min-width:0;}
.conv-nome{font-weight:600;font-size:13px;}
.conv-sub{font-size:12px;color:var(--texto-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.conv-chat{display:none;background:#EDE9E0;padding:12px 13px;border-top:1px solid var(--borda);}
.conv-item.aberta .conv-chat{display:block;}
.msgs{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.msg{max-width:70%;padding:8px 11px;border-radius:9px;font-size:12px;line-height:1.5;}
.msg.paciente{background:var(--branco);align-self:flex-start;border-bottom-left-radius:2px;}
.msg.bot{background:var(--verde-bg);color:#0A4A30;align-self:flex-start;border-bottom-left-radius:2px;}
.msg.farmaceutico{background:var(--verde);color:#fff;align-self:flex-end;border-bottom-right-radius:2px;}
.msg-meta{font-size:10px;opacity:.6;margin-top:2px;}
.msg-tipo{font-size:10px;font-weight:700;opacity:.65;margin-bottom:2px;}
.resp-area{display:flex;gap:8px;align-items:flex-end;}
.resp-inp{flex:1;padding:9px 12px;border:1.5px solid var(--borda);border-radius:var(--r-sm);font-size:13px;resize:none;outline:none;min-height:42px;max-height:100px;}
.resp-inp:focus{border-color:var(--verde-m);}
.btn-enviar{padding:10px 14px;background:var(--verde);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-enviar:hover{background:var(--verde-m);}
.btn-enviar:disabled{opacity:.5;cursor:not-allowed;}
.btn-resolver-txt{font-size:11px;color:var(--texto-ter);background:none;border:none;margin-top:6px;text-decoration:underline;}
.btn-resolver-txt:hover{color:var(--texto-sec);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;}
.overlay.aberto{display:flex;}
.modal{background:var(--branco);border-radius:14px;padding:26px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal-tit{font-size:15px;font-weight:800;margin-bottom:18px;}
.modal-acoes{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.ok{background:var(--verde);color:#fff;}
#toast.err{background:var(--vermelho);color:#fff;}

/* SECAO TITULO */
.sec-titulo{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:18px;border-bottom:2px solid var(--borda);}
.tab{padding:8px 16px;border:none;background:none;font-size:13px;font-weight:500;color:var(--texto-sec);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;}
.tab:hover{color:var(--verde);}
.tab.ativa{color:var(--verde);border-bottom-color:var(--verde);font-weight:700;}
.tab-painel{display:none;}
.tab-painel.ativo{display:block;}

@media(max-width:768px){
  .dash-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .sidebar{display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">💊</div>
      <div><h1>FarmaBot SUS</h1><p>DAF Trindade-GO</p></div>
    </div>
    <div class="fg"><label class="lbl">Login</label><input class="inp" id="li" placeholder="CPF" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="fg"><label class="lbl">Senha</label><input class="inp" type="password" id="ls" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn-login-submit" onclick="login()">Entrar</button>
    <div class="err-txt" id="lerr">Login ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="tela-app">
  <div class="topbar">
    <div class="topbar-l">
      <span>💊</span>
      <div><div class="topbar-nome" id="tnome">—</div><div class="topbar-ubs" id="tubs">—</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="notif-wrap" style="display:none"><span class="nav-badge r" id="notif-num">0</span></div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main-content"></div>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal-body"></div></div>
<div id="toast"></div>

<script>
const BACKEND = 'https://wppconnect-farmabot.onrender.com';
const SB = 'https://kjwfzsouoeolycekyldd.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtqd2Z6c291b2VvbHljZWt5bGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjcxODksImV4cCI6MjA5NjcwMzE4OX0.aRWc4yBiWx7W8NjQIcHn7JvxAqDho0fnvdzKSndOUDU';
const AT = 'DAF1401';

let U = null; // usuário logado
let secaoAtiva = '';

// ── SUPABASE ──
async function sb(path, opts={}) {
  const r = await fetch(`${SB}/rest/v1/${path}`, {
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  return r.json();
}

// ── LOGIN ──
async function login() {
  const li = document.getElementById('li').value.trim();
  const ls = document.getElementById('ls').value;
  const err = document.getElementById('lerr');
  err.style.display = 'none';

  // Gestor
  if (li === AT && ls === AT) {
    U = { id: 'admin', nome: 'Vanessa', ubs: 'DAF — Diretoria de Assistência Farmacêutica', perfil: 'gestor' };
    iniciarApp();
    return;
  }

  // Farmacêutico
  try {
    const d = await sb(`farmabot_usuarios?id=eq.${li}&senha=eq.${encodeURIComponent(ls)}&ativo=eq.true&limit=1`);
    if (!d?.[0]) { err.style.display = 'block'; return; }
    U = d[0];
    U.perfil = U.perfil || 'farmaceutico';
    sb(`farmabot_usuarios?id=eq.${li}`,{method:'PATCH',body:JSON.stringify({ultimo_acesso:new Date().toISOString()})}).catch(()=>{});
    iniciarApp();
  } catch(e) { err.style.display = 'block'; err.textContent = 'Erro de conexão.'; }
}

function sair() {
  U = null;
  document.getElementById('tela-app').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
  document.getElementById('li').value = '';
  document.getElementById('ls').value = '';
}

function iniciarApp() {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('tela-app').style.display = 'block';
  document.getElementById('tnome').textContent = U.nome;
  document.getElementById('tubs').textContent = U.ubs;
  renderSidebar();
  irSecao('dashboard');
  setInterval(verificarPendencias, 15000);
  // Intervalo dedicado para atualizar conversa aberta em tempo real
  setInterval(async () => {
    if (_conversaAbertaId) await atualizarConversaAberta();
  }, 8000);
}

// ── SIDEBAR ──
function renderSidebar() {
  const isGestor = U.perfil === 'gestor';
  const itens = isGestor ? [
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'ubs',icon:'🏥',label:'UBSs'},
    {id:'farmaceuticos',icon:'👩‍⚕️',label:'Farmacêuticos'},
    {id:'cobertura',icon:'🗺️',label:'Mapa de cobertura'},
    {id:'educacao',icon:'📚',label:'Educação em Saúde'},
    {id:'conversas-gestor',icon:'💬',label:'Conversas',badge:'conv'},
  ] : [
    {id:'dashboard',icon:'📊',label:'Início'},
    {id:'pacientes',icon:'👥',label:'Meus pacientes'},
    {id:'renovacoes',icon:'📋',label:'Renovações',badge:'renov'},
    {id:'queixas',icon:'⚠️',label:'Queixas/Reações'},
    {id:'familia',icon:'👨‍👩‍👧',label:'Farmácia da família'},
    {id:'educacao',icon:'📚',label:'Educação em Saúde'},
    {id:'conversas',icon:'💬',label:'Conversas',badge:'conv'},
  ];
  document.getElementById('sidebar').innerHTML =
    `<div class="nav-sec">${isGestor ? 'Gestão' : 'Atendimento'}</div>` +
    itens.map(i=>`<button class="nav-item" id="nav-${i.id}" onclick="irSecao('${i.id}')">
      <span class="nav-icon">${i.icon}</span>${i.label}
      ${i.badge ? `<span class="nav-badge r" id="badge-${i.badge}" style="display:none">0</span>` : ''}
    </button>`).join('');
}

function irSecao(id) {
  secaoAtiva = id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('ativo'));
  document.getElementById(`nav-${id}`)?.classList.add('ativo');
  const main = document.getElementById('main-content');
  main.innerHTML = '<div style="padding:40px;text-align:center;color:var(--texto-ter)">Carregando...</div>';

  const fns = {
    dashboard: renderDashboard,
    ubs: renderUbs,
    farmaceuticos: renderFarmaceuticos,
    cobertura: renderCobertura,
    pacientes: renderPacientes,
    renovacoes: renderRenovacoes,
    queixas: renderQueixas,
    familia: renderFamilia,
    educacao: renderEducacao,
    conversas: ()=>renderConversas(false),
    'conversas-gestor': ()=>renderConversas(true),
  };
  (fns[id] || (()=>{}))();
}

// ── DASHBOARD ──
async function renderDashboard() {
  const isGestor = U.perfil === 'gestor';
  const [pacs, convs, users] = await Promise.all([
    sb(isGestor ? 'farmabot_pacientes?select=id' : `farmabot_pacientes?ubs_nome=eq.${enc(U.ubs)}&select=id`),
    sb(isGestor ? 'farmabot_conversas?pendente=eq.true&select=id' : `farmabot_conversas?unidade=eq.${enc(U.ubs)}&pendente=eq.true&select=id`),
    isGestor ? sb('farmabot_usuarios?perfil=eq.farmaceutico&ativo=eq.true&select=id') : Promise.resolve([]),
  ]);

  // Conta alertas Beers
  let beers = 0;
  if (!isGestor) {
    const ps = await sb(`farmabot_pacientes?ubs_nome=eq.${enc(U.ubs)}&select=medicamentos`);
    (ps||[]).forEach(p=>(p.medicamentos||[]).forEach(m=>{ if(m.beers_alerta) beers++; }));
  }

  const cards = isGestor ? [
    {cl:'',lbl:'Farmacêuticos ativos',num:Array.isArray(users)?users.length:0,sub:'no sistema'},
    {cl:'',lbl:'Pacientes monitorados',num:Array.isArray(pacs)?pacs.length:0,sub:'com lembretes'},

async function cadastrarFarm(btn) {
  const nome=document.getElementById('f-nome').value.trim();
  const cpf=document.getElementById('f-cpf').value.trim();
  const senha=document.getElementById('f-senha').value.trim();
  const crf=document.getElementById('f-crf').value.trim();
  const ubs=document.getElementById('f-ubs').value;
  if (!nome||!cpf||!senha||!ubs){toast('Nome, CPF, senha e UBS são obrigatórios','err');return;}
  if (cpf.length!==11){toast('CPF deve ter 11 dígitos','err');return;}
  setBtnLoad(btn,true);
  try {
    const existe = await sb(`farmabot_usuarios?id=eq.${cpf}&select=id`);
    if (existe?.length){toast('CPF já cadastrado','err');setBtnLoad(btn,false);return;}
    const d = await sb('farmabot_usuarios',{method:'POST',body:JSON.stringify({id:cpf,nome,senha,cargo:'Farmacêutico(a)',perfil:'farmaceutico',ubs,crf:crf||null,ativo:true,senha_provisoria:true})});
    if (!d?.message){toast('✅ Farmacêutico cadastrado!');renderFarmaceuticos();}
    else toast(d.message||'Erro','err');
  } catch{toast('Erro de conexão','err');}
  setBtnLoad(btn,false);
}

async function analisarPrescricao(p) {
  const meds = p.medicamentos||[];
  if (meds.length < 2) { toast('Paciente precisa ter pelo menos 2 medicamentos para análise','err'); return; }

  // Monta modal de análise
  abrirModal(`🔍 Análise de prescrição — ${p.nome}`,`
    <div style="font-size:12px;color:var(--texto-sec);margin-bottom:14px">
      ${meds.length} medicamentos · ${p.idade||'?'} anos · ${(p.condicoes||[]).join(', ')||'condições não informadas'}
    </div>
    <div id="analise-beers-section"></div>
    <div id="analise-interacoes-section"></div>
    <div id="analise-ia-section">
      <div style="background:var(--roxo-bg);border:1px solid var(--roxo);border-radius:var(--r);padding:14px;margin-top:10px">
        <div style="font-weight:700;color:var(--roxo);margin-bottom:8px">🤖 Análise clínica por IA</div>
        <div id="ia-resultado" style="font-size:13px;color:var(--texto-sec)">
          <button class="btn btn-ro btn-sm" onclick='rodarAnaliseIA(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Gerar análise clínica completa</button>
        </div>
      </div>
    </div>
    <div style="margin-top:14px;padding:12px;background:var(--azul-bg);border:1px solid #B5D3F3;border-radius:var(--r)">
      <div style="font-weight:700;color:var(--azul);font-size:13px;margin-bottom:8px">🔗 Verificar interações online</div>
      <div style="font-size:12px;color:var(--texto-sec);margin-bottom:10px">Clique para abrir com os medicamentos já preenchidos:</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button onclick="abrirDrugs(${JSON.stringify(p.medicamentos).replace(/"/g,'&quot;')})"
          style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:white;border:1px solid #B5D3F3;border-radius:var(--r-sm);font-size:12px;font-weight:600;color:var(--azul);cursor:pointer;text-align:left">
          💊 Abrir Drugs.com + copiar lista de medicamentos
          <span style="font-size:10px;opacity:.7;margin-left:auto">${p.medicamentos?.length||0} medicamentos →</span>
        </button>
        <a href="https://reference.medscape.com/drug-interactionchecker" target="_blank"
          style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:white;border:1px solid #B5D3F3;border-radius:var(--r-sm);font-size:12px;font-weight:600;color:var(--azul);text-decoration:none">
          🏥 Abrir no Medscape Drug Interaction Checker
          <span style="font-size:10px;opacity:.7;margin-left:auto">verificação manual →</span>
        </a>
      </div>
    </div>
    <div class="modal-acoes">
      <button class="btn btn-c" onclick='verPaciente(${JSON.stringify(p).replace(/'/g,"&#39;")})'>← Voltar</button>
    </div>`);

  // 1. Alertas Beers dos medicamentos atuais
  const beersAlertas = meds.filter(m=>m.beers_alerta);
  const beersEl = document.getElementById('analise-beers-section');
  if (beersAlertas.length) {
    beersEl.innerHTML = `
      <div style="background:var(--vermelho-bg);border:1.5px solid var(--vermelho-borda);border-radius:var(--r);padding:14px;margin-bottom:10px">
        <div style="font-weight:700;color:var(--vermelho);margin-bottom:8px">🚨 Alertas Lista Beers 2023 (${beersAlertas.length} medicamento(s))</div>
        ${beersAlertas.map(m=>`
          <div style="border-top:1px solid var(--vermelho-borda);padding:8px 0;font-size:12px">
            <strong style="color:var(--vermelho)">${m.nome}</strong>
            <span class="badge br" style="margin-left:6px">${m.beers_risco||'ALERTA'}</span>
            <div style="color:var(--vermelho);margin-top:3px">${m.beers_motivo||''}</div>
          </div>`).join('')}
      </div>`;
  } else {
    beersEl.innerHTML = `<div style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:var(--r);padding:10px;margin-bottom:10px;font-size:12px;color:var(--verde)">✅ Nenhum medicamento na Lista Beers</div>`;
  }

  // 2. Interações entre todos os medicamentos
  const nomeMeds = meds.map(m=>m.nome.toUpperCase());
  const todasInteracoes = [];
  for (let i=0; i<nomeMeds.length; i++) {
    const resto = nomeMeds.filter((_,j)=>j!==i);
    const ints = checarInteracoes(nomeMeds[i], resto);
    ints.forEach(int=>{ if(!todasInteracoes.includes(int)) todasInteracoes.push(int); });
  }

  const intEl = document.getElementById('analise-interacoes-section');
  if (todasInteracoes.length) {
    intEl.innerHTML = `
      <div class="interacao-box">
        <div class="interacao-tit">⚠️ Interações medicamentosas detectadas (${todasInteracoes.length})</div>
        ${todasInteracoes.map(i=>`<div class="interacao-li">${i}</div>`).join('')}
      </div>`;
  } else {
    intEl.innerHTML = `<div style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:var(--r);padding:10px;margin-bottom:10px;font-size:12px;color:var(--verde)">✅ Nenhuma interação conhecida detectada na base local</div>`;
  }
}

function renderMedsList(meds) {
  if (!meds.length) return '<div class="vazia" style="padding:16px"><em>💊</em>Nenhum medicamento</div>';
  const hoje = new Date();
  return meds.map((m,i)=>{
    const temBeers = m.beers_alerta && m.beers_risco;
    const corBeers = m.beers_risco==='ALTO' ? 'vermelho' : 'ambar';

    // Calcula status da receita
    let statusReceita = '';
    if (m.data_prescricao) {
      const dp = new Date(m.data_prescricao);
      const dias = Math.floor((hoje - dp) / (1000 * 60 * 60 * 24));
      const dv = new Date(m.data_prescricao);
      dv.setMonth(dv.getMonth() + 6);
      const dvStr = dv.toLocaleDateString('pt-BR');
      if (dias > 180) {
        statusReceita = `<span class="badge br" style="margin-left:6px">⚠ Receita vencida</span>`;
      } else if (dias >= 150) {
        statusReceita = `<span class="badge ba" style="margin-left:6px">⏰ Renovar até ${dvStr}</span>`;
      } else if (m.data_vencimento) {
        statusReceita = `<span style="font-size:11px;color:var(--texto-ter);margin-left:6px">válida até ${dvStr}</span>`;
      }
    }

    return `
    <div style="border:1px solid ${temBeers?'var(--'+corBeers+'-borda)':'var(--borda)'};border-radius:8px;padding:11px;margin-bottom:8px;background:${temBeers?'var(--'+corBeers+'-bg)':'white'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;margin-bottom:3px">
            ${m.nome}
            ${temBeers?`<span class="badge ${corBeers==='vermelho'?'br':'ba'}" style="margin-left:6px">⚠ ${m.beers_risco}</span>`:''}
            ${statusReceita}
          </div>
          <div style="font-size:12px;color:var(--texto-sec);margin-bottom:5px">${m.dose||'—'}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${(m.horarios||[]).map(h=>`<span style="background:var(--verde);color:white;padding:3px 8px;border-radius:20px;font-size:11px">⏰ ${h}</span>`).join('')}
          </div>
          ${temBeers?`<div style="font-size:11px;color:var(--${corBeers});margin-top:6px">⚠ ${m.beers_motivo||''}</div>`:''}
        </div>
        <button onclick="confirmarRemoverMed(${i})" title="Remover"
          style="background:var(--vermelho-bg);color:var(--vermelho);border:none;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;flex-shrink:0">🗑</button>
      </div>
    </div>`;
  }).join('');
}

async function confirmarRemoverMed(idx) {
  const p = _pacAtual;
  if (!p) return;
  const med = p.medicamentos[idx];
  if (!confirm(`Remover "${med.nome}" da lista de medicamentos de ${p.nome}?`)) return;
  const meds = p.medicamentos.filter((_,i)=>i!==idx);
  try {
    await sb(`farmabot_pacientes?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({medicamentos:meds})});
    toast('✅ Medicamento removido!');
    _pacAtual = {...p, medicamentos: meds};
    verPaciente(_pacAtual);
    renderPacientes();
  } catch { toast('Erro ao remover','err'); }
}

function toggleHorario(btn, h) {
  const idx = _horariosTemp.indexOf(h);
  if (idx >= 0) {
    _horariosTemp.splice(idx, 1);
    btn.style.background = 'white';
    btn.style.borderColor = 'var(--borda)';
    btn.style.color = 'var(--texto)';
  } else {
    _horariosTemp.push(h);
    btn.style.background = 'var(--verde)';
    btn.style.borderColor = 'var(--verde)';
    btn.style.color = 'white';
  }
  renderHorariosSelecionados();
}

function adicionarHorarioCustom() {
  const val = document.getElementById('am-horario-custom').value;
  if (!val) return;
  if (!_horariosTemp.includes(val)) {
    _horariosTemp.push(val);
    renderHorariosSelecionados();
  }
  document.getElementById('am-horario-custom').value = '';
}

function renderHorariosSelecionados() {
  const el = document.getElementById('horarios-selecionados');
  if (!el) return;
  const label = document.querySelector('.lbl + div + div + div .lbl') || null;
  el.innerHTML = _horariosTemp.length
    ? _horariosTemp.map((h,i)=>`<span class="med-chip" style="background:var(--verde-bg);color:var(--verde)">${h} <span onclick="_horariosTemp.splice(${i},1);renderHorariosSelecionados()" style="cursor:pointer;margin-left:3px">×</span></span>`).join('')
    : '';
}

async function enviarOrientacoes(p, meds) {

  if (!medicamentos.length) { toast('Paciente não tem medicamentos cadastrados', 'err'); return; }
  if (!p.telefone) { toast('Paciente não tem telefone cadastrado', 'err'); return; }

  // Monta prévia da mensagem localmente
  const primeiroNome = (p.nome || '').split(' ')[0];
  const horariosMeds = medicamentos.map(m => `• ${m.nome}: ${(m.horarios||[]).join(', ')}`).join('\n');

  // Orientações fixas
  const ORIENTACOES = {
    'METFORMINA': ['Tome sempre junto com as refeições para evitar enjoo.','Nunca pare sem orientação médica.','Beba bastante água.'],
    'GLIBENCLAMIDA': ['Tome 30 min antes do café da manhã.','Nunca pule refeições — pode causar tontura (hipoglicemia).','Se sentir tremores ou suor frio, coma algo doce imediatamente.'],
    'INSULINA': ['Aplique sempre no mesmo horário.','Guarde na geladeira (não no freezer).','Alterne os locais de aplicação.'],
    'CAPTOPRIL': ['Tome em jejum, 1 hora antes das refeições.','Pode causar tosse seca — avise o médico se incomodar.'],
    'ENALAPRIL': ['Tome sempre no mesmo horário.','Evite sal em excesso.'],
    'LOSARTANA': ['Pode ser tomada com ou sem alimentos.','Levante-se devagar para evitar tontura.'],
    'ANLODIPINO': ['Não tome suco de toranja (grapefruit).','Se sentir inchaço nos pés, avise o médico.'],
    'ATENOLOL': ['Nunca pare de tomar de repente.','Pode causar cansaço no início.'],
    'CARVEDILOL': ['Tome junto com as refeições.','Nunca interrompa sem orientação médica.'],
    'HIDROCLOROTIAZIDA': ['Tome pela manhã para não atrapalhar o sono.','Aumente alimentos ricos em potássio (banana, laranja).'],
    'FUROSEMIDA': ['Tome pela manhã — causa aumento de urina.','Repor potássio com alimentação.'],
    'SINVASTATINA': ['Tome à noite, antes de dormir.','Se sentir dor muscular forte, avise o médico.'],
    'ROSUVASTATINA': ['Pode ser tomada a qualquer hora.','Se sentir dor muscular forte, avise o médico.'],
    'OMEPRAZOL': ['Tome em jejum, 30 a 60 min antes do café.','Engolha inteiro — não mastigue.'],
    'LEVOTIROXINA': ['Tome em jejum, 30 a 60 min antes do café.','Não tome junto com leite ou cálcio.'],
    'PREDNISONA': ['Tome junto com o café da manhã.','Nunca pare de tomar de repente.'],
    'DIPIRONA': ['Use apenas quando necessário.','Respeite o intervalo mínimo de 6 horas.'],
    'AMIODARONA': ['Evite exposição prolongada ao sol.','Faça exames de tireoide e fígado regularmente.'],
    'DIGOXINA': ['Tome sempre no mesmo horário.','Avise o médico se sentir náusea ou visão amarelada.'],

async function confirmarEnvioOrientacoes(telefone, pacienteId) {
  const msg = document.getElementById('preview-msg')?.value;
  if (!msg) return;
  const btn = document.querySelector('.modal-acoes .btn-v');
  if (btn) { btn.innerHTML = '<span class="spin"></span> Enviando...'; btn.disabled = true; }
  try {
    const res = await fetch(`${BACKEND}/orientacoes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': AT },
      body: JSON.stringify({ telefone, mensagem_customizada: msg })
    });
    const d = await res.json();
    if (d.ok) { toast('📤 Orientações enviadas ao paciente!'); fecharModal(); }
    else toast(d.erro || 'Erro ao enviar', 'err');
  } catch(e) { toast('Erro de conexão', 'err'); }
}

function filtrarMeds(val) {
  const sug = document.getElementById('meds-sugestoes');
  if (!val || val.length < 2) { sug.style.display='none'; return; }
  const matches = MEDS_SUS.filter(m=>m.nome.toUpperCase().includes(val.toUpperCase())).slice(0,10);
  if (!matches.length) { sug.style.display='none'; return; }
  sug.innerHTML = matches.map(m=>`
    <div onclick="selecionarMed(${JSON.stringify(m).replace(/"/g,'&quot;')})"
      style="padding:9px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between"
      onmouseover="this.style.background='var(--verde-bg)'" onmouseout="this.style.background=''">
      <span>${m.nome}</span>
      ${m.beers ? `<span class="badge ${m.beers.risco==='ALTO'?'br':'ba'}" style="font-size:10px;flex-shrink:0;margin-left:8px">⚠ ${m.beers.risco}</span>` : ''}
    </div>`).join('');
  sug.style.display='block';
}

function selecionarMed(m) {
  document.getElementById('am-nome').value = m.nome;
  document.getElementById('meds-sugestoes').style.display = 'none';
  // Mostrar alerta Beers imediatamente da lista local
  const el = document.getElementById('beers-resultado');
  if (!el) return;
  if (m.beers) {
    const cor = m.beers.risco === 'ALTO' ? 'vermelho' : 'ambar';
    const icon = m.beers.risco === 'ALTO' ? '🚨' : '⚠️';
    el.innerHTML = `
      <div style="background:var(--${cor}-bg);border:1.5px solid var(--${cor}-borda);border-radius:var(--r);padding:13px;margin-top:10px">
        <div style="font-weight:700;color:var(--${cor});font-size:13px;margin-bottom:6px">${icon} Lista Beers 2023 — Risco ${m.beers.risco}</div>
        <div style="font-size:12px;color:var(--${cor});margin-bottom:4px">⚠ ${m.beers.motivo}</div>
        <div style="font-size:12px;color:var(--${cor})">💡 Alternativa: ${m.beers.alternativa}</div>
      </div>`;
    window._beersAlerta = { alerta: true, motivo: m.beers.motivo, risco: m.beers.risco };
  } else {
    el.innerHTML = `<div style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:var(--r);padding:10px;margin-top:10px;font-size:12px;color:var(--verde)">✅ Não consta na Lista Beers 2023</div>`;
    window._beersAlerta = { alerta: false, motivo: null };
  }
  // Checar interações com medicamentos já cadastrados
  checarInteracoesLocais(m.nome);
}

function checarInteracoesLocais(novoMed) {
  if (!_pacAtual) return;
  const medsExistentes = (_pacAtual.medicamentos||[]).map(m=>m.nome.toUpperCase());
  const novo = novoMed.toUpperCase();
  const interacoes = checarInteracoes(novo, medsExistentes);
  if (interacoes.length) {
    const el = document.getElementById('beers-resultado');
    if (el) el.innerHTML += `
      <div class="interacao-box" style="margin-top:8px">
        <div class="interacao-tit">⚠️ Interações com medicamentos atuais</div>
        ${interacoes.map(i=>`<div class="interacao-li">${i}</div>`).join('')}
        <div style="font-size:11px;color:var(--ambar);margin-top:6px">
          Verifique em: 
          <a href="https://www.drugs.com/interactions-check.php" target="_blank" style="color:var(--ambar)">Drugs.com</a> · 
          <a href="https://reference.medscape.com/drug-interactionchecker" target="_blank" style="color:var(--ambar)">Medscape</a>
        </div>
      </div>`;
  }
}

function navMeds(e) {

}

let beersTimer = null;
function debounceBeers(val, pacId) {
  clearTimeout(beersTimer);
  if (val.length < 3) { document.getElementById('beers-resultado').innerHTML = ''; return; }
  document.getElementById('beers-resultado').innerHTML = '<div style="font-size:12px;color:var(--texto-ter);margin-top:8px">🔍 Verificando Lista Beers...</div>';
  beersTimer = setTimeout(()=>verificarBeers(val, pacId), 600);
}

async function verificarBeers(nomeMed, pacId) {
  const el = document.getElementById('beers-resultado');
  if (!el) return;
  try {
    // Busca na FDA API (OpenFDA)
    const query = encodeURIComponent(nomeMed);
    const r = await fetch(`https://api.fda.gov/drug/label.json?search=generic_name:"${query}"+OR+brand_name:"${query}"&limit=1`);
    const d = await r.json();
    const resultado = d.results?.[0];
    let html = '';

    if (resultado) {
      // Checa warnings para idosos
      const warnings = (resultado.warnings_and_cautions||resultado.warnings||[]).join(' ').toLowerCase();
      const elderly = warnings.includes('elderly') || warnings.includes('older adult') || warnings.includes('geriatric');

      // Lista Beers simplificada (medicamentos mais comuns)
      const beersLista = {
        'amiodarona':  'Alto risco cardíaco em idosos (Lista Beers)',
        'digoxina':    'Risco de toxicidade aumentado em idosos — evitar >0,125mg/dia',
        'nifedipino':  'Hipotensão e risco de fraturas em idosos (Beers)',
        'amitriptilina':'Anticolinérgico — confusão e risco de quedas em idosos',
        'clonazepam':  'Benzodiazepínico — sedação excessiva e quedas em idosos',
        'diazepam':    'Benzodiazepínico — sedação excessiva e quedas em idosos',
        'alprazolam':  'Benzodiazepínico — sedação excessiva e quedas em idosos',
        'zolpidem':    'Hipnótico — risco de quedas e fraturas em idosos',
        'haloperidol': 'Antipsicótico — risco aumentado de AVC e morte em idosos',
        'prometazina': 'Anticolinérgico — não recomendado em idosos (Beers)',
        'indometacina':'AINE — risco GI e renal elevado em idosos',
        'piroxicam':   'AINE — risco GI e renal elevado em idosos',
        'metoclopramida':'Risco de sintomas extrapiramidais em idosos',
        'cimetidina':  'Anticolinérgico — confusão em idosos',
        'doxazosina':  'Hipotensão ortostática e risco de quedas',
        'glibenclamida':'Hipoglicemia prolongada em idosos (preferir glicazida)',
      };

      const nomeLower = nomeMed.toLowerCase();
      const beersMatch = Object.entries(beersLista).find(([k])=>nomeLower.includes(k));

      if (beersMatch) {
        html += `<div class="beers-box"><div class="beers-tit">🚨 Alerta Lista Beers — AGS 2023</div>
          <div class="beers-li">${beersMatch[1]}</div>
          <div class="beers-li">Considere alternativa mais segura para idosos.</div></div>`;
        // Marca para salvar
        window._beersAlerta = { alerta: true, motivo: beersMatch[1] };
      } else if (elderly) {
        html += `<div class="beers-box"><div class="beers-tit">⚠️ Cautela em idosos (FDA)</div>
          <div class="beers-li">A bula da FDA menciona precauções para pacientes idosos.</div></div>`;
        window._beersAlerta = { alerta: true, motivo: 'Cautela em idosos — FDA' };
      } else {
        html += `<div style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:var(--verde)">✅ Não encontrado na Lista Beers</div>`;
        window._beersAlerta = { alerta: false, motivo: null };
      }

      // Busca interações com medicamentos já cadastrados do paciente
      if (pacId) {
        const pac = await sb(`farmabot_pacientes?id=eq.${pacId}&select=medicamentos`);
        const medsExistentes = pac?.[0]?.medicamentos||[];
        if (medsExistentes.length > 0) {
          const interacoes = checarInteracoes(nomeLower, medsExistentes.map(m=>m.nome.toLowerCase()));
          if (interacoes.length) {
            html += `<div class="interacao-box"><div class="interacao-tit">⚠️ Possíveis interações medicamentosas</div>
              ${interacoes.map(i=>`<div class="interacao-li">${i}</div>`).join('')}</div>`;
          }
        }
      }
    } else {
      html = `<div style="font-size:12px;color:var(--texto-ter);margin-top:8px">Medicamento não encontrado na base FDA. Verifique o nome ou consulte referência clínica.</div>`;
      window._beersAlerta = { alerta: false, motivo: null };
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div style="font-size:12px;color:var(--texto-ter);margin-top:8px">⚠️ Não foi possível verificar agora. Salve e confira manualmente.</div>`;
    window._beersAlerta = { alerta: false, motivo: null };
  }
}

function abrirDrugs(medicamentos) {
  // Monta lista com nomes genéricos para colar no Drugs.com
  const lista = (medicamentos||[]).map(m => {
    // Pega só o nome genérico (primeira palavra, sem dose/forma)
    return m.nome.split(' ')[0].toLowerCase();
  }).join('\n');

  // Copia para área de transferência
  navigator.clipboard.writeText(lista).then(() => {
    toast('📋 Lista copiada! Cole um por um no Drugs.com');
  }).catch(() => {
    toast('Abrindo Drugs.com — liste os medicamentos manualmente');
  });

  // Abre o Drugs.com
  window.open('https://www.drugs.com/interaction/list/', '_blank');
}

function montarLinkDrugs(medicamentos) {
  if (!medicamentos?.length) return 'https://www.drugs.com/interactions-check.php';
  // Drugs.com aceita nomes via parâmetro drug_list separado por vírgula
  // Extrai só o nome genérico (antes do primeiro número)
  const nomes = medicamentos.map(m => {
    const nome = m.nome.split(' ')[0].toLowerCase(); // ex: "METFORMINA" → "metformina"
    return encodeURIComponent(nome);
  }).slice(0, 30); // limite de 30
  return `https://www.drugs.com/interactions-check.php?drug_list=${nomes.join(',')}`;
}

function checarInteracoes(novo, existentes) {
  const interacoesConhecidas = [
    {a:'varfarina',b:['aspirina','ibuprofeno','naproxeno'],msg:'Risco aumentado de sangramento'},
    {a:'metformina',b:['contraste iodado'],msg:'Risco de acidose lática — suspender antes de contraste'},
    {a:'digoxina',b:['amiodarona','claritromicina','azitromicina'],msg:'Aumenta nível sérico da digoxina — risco de toxicidade'},
    {a:'sinvastatina',b:['amiodarona','fluconazol'],msg:'Risco de miopatia / rabdomiólise'},
    {a:'captopril',b:['enalapril','losartana','valsartana'],msg:'Duplo bloqueio do RAAS — hipercalemia e lesão renal'},
    {a:'clonazepam',b:['alprazolam','diazepam','zolpidem'],msg:'Dupla sedação — risco de quedas e depressão respiratória'},
    {a:'amiodarona',b:['digoxina','sinvastatina'],msg:'Interação significativa — monitorar'},
    {a:'fluconazol',b:['varfarina','sinvastatina'],msg:'Inibe CYP2C9/3A4 — potencializa efeito'},
  ];
  const alertas = [];
  interacoesConhecidas.forEach(({a,b,msg})=>{
    const match = (novo.includes(a) && existentes.some(e=>b.some(bi=>e.includes(bi)))) ||
                  (b.some(bi=>novo.includes(bi)) && existentes.some(e=>e.includes(a)));
    if (match) alertas.push(`${msg}`);
  });
  return alertas;
}

async function salvarMed() {
  const p = _pacAtual;
  if (!p) { toast('Erro: paciente não identificado','err'); return; }
  const nome=document.getElementById('am-nome').value.trim();
  const dose=document.getElementById('am-dose').value.trim();
  const dataPrescrição=document.getElementById('am-data-prescricao').value;
  if (!nome){toast('Selecione o medicamento','err');return;}
  if (!_horariosTemp.length){toast('Selecione pelo menos um horário','err');return;}

  // Calcula data de vencimento (6 meses)
  let dataVencimento = null;
  if (dataPrescrição) {
    const dv = new Date(dataPrescrição);
    dv.setMonth(dv.getMonth() + 6);
    dataVencimento = dv.toLocaleDateString('en-CA');
  }

  const novoMed = {
    nome, dose,
    horarios: [..._horariosTemp],
    data_prescricao: dataPrescrição || null,
    data_vencimento: dataVencimento,
    beers_alerta: window._beersAlerta?.alerta||false,
    beers_motivo: window._beersAlerta?.motivo||null,
    beers_risco: window._beersAlerta?.risco||null
  };
  const meds = [...(p.medicamentos||[]), novoMed];
  try {
    await sb(`farmabot_pacientes?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({medicamentos:meds})});
    toast('✅ Medicamento adicionado à prescrição!');

    // Envia orientações automaticamente via WhatsApp
    if (p.telefone) {
      enviarOrientacoes(p, meds).catch(e => console.error('Orientações:', e));
    }

    window._beersAlerta = null;
    _horariosTemp = [];
    _pacAtual = {...p, medicamentos: meds};
    verPaciente(_pacAtual);
    renderPacientes();
  } catch{toast('Erro ao salvar','err');}
}

async function renderConversas(isGestor) {
  const path = isGestor
    ? 'farmabot_conversas?order=hora.desc&limit=50'

  document.getElementById('main-content').innerHTML = `
    <div class="sec-titulo" style="justify-content:space-between">
      <span>💬 Conversas</span>
      <button class="btn btn-c btn-sm" onclick="irSecao('${isGestor?'conversas-gestor':'conversas'}')">↻ Atualizar</button>

      <button class="tab ativa" id="tab-pend" onclick="filtrarConversas('pendentes')">⏳ Pendentes <span class="nav-badge r">${pendentes.length}</span></button>
      <button class="tab" id="tab-todas" onclick="filtrarConversas('todas')">Todas (${lista.length})</button>

function filtrarConversas(tipo) {
  document.getElementById('tab-pend').classList.toggle('ativa', tipo==='pendentes');
  document.getElementById('tab-todas').classList.toggle('ativa', tipo==='todas');
  const lista = tipo==='pendentes' ? window._convPend : window._convTodas;
  document.getElementById('conv-lista').innerHTML = renderConvLista(lista, window._convIsGestor);
}

function renderConvLista(lista, isGestor) {
  if (!lista.length) return '<div class="vazia"><em>✅</em>Nenhuma conversa aqui</div>';
  return lista.map(c=>{
    const ini=(c.paciente||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const ultMsg=(c.msgs||[]).filter(m=>m.tipo==='paciente').slice(-1)[0];
    return `<div class="conv-item" id="ci-${c.id}">
      <div class="conv-header" onclick="toggleConv('${c.id}')">
        <div class="av av-v">${ini}</div>
        <div class="conv-info">
          <div class="conv-nome">${c.paciente||c.numero||'—'} ${isGestor?`<span style="font-size:11px;color:var(--texto-ter)">· ${c.unidade||'—'}</span>`:''}</div>
          <div class="conv-sub">${ultMsg?.texto||'Sem mensagens'}</div>
        </div>
        <div class="conv-meta">
          <span class="badge ${c.pendente?'ba':'bv'}">${c.pendente?'⏳ pendente':'✅ resolvida'}</span>
          <span style="font-size:11px;color:var(--texto-ter)">${c.hora||''}</span>
        </div>
      </div>
      <div class="conv-chat">
        <div class="msgs" id="msgs-${c.id}">${renderMsgsChat(c.msgs||[])}</div>
        ${c.pendente && !isGestor ? `
        <div class="resp-area">
          <textarea class="resp-inp" id="resp-${c.id}" placeholder="Responda ao paciente..." rows="2"></textarea>
          <button class="btn-enviar" onclick="enviarResp('${c.id}','${c.numero}')">Enviar ✈️</button>
        </div>
        <button class="btn-resolver-txt" onclick="resolverConv('${c.id}')">Marcar como resolvida sem responder</button>
        ` : c.pendente && isGestor ? `<p style="font-size:12px;color:var(--texto-sec);text-align:center;padding:6px">Acompanhamento do gestor — resposta pelo painel do farmacêutico</p>` : `<p style="font-size:12px;color:var(--texto-sec);text-align:center;padding:6px">✅ Conversa resolvida</p>`}
      </div>
    </div>`;
  }).join('');
}

function renderMsgsChat(msgs) {
  return msgs.map(m=>{
    const tipo = m.tipo==='farmaceutico'?'farmaceutico':m.tipo==='bot'?'bot':'paciente';
    const label = tipo==='farmaceutico'?'👩‍⚕️ Farmacêutico':tipo==='bot'?'🤖 Bot':'👤 Paciente';
    return `<div class="msg ${tipo}">
      <div class="msg-tipo">${label}</div>
      ${(m.texto||'').replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>')}
      <div class="msg-meta">${m.hora||''}</div>
    </div>`;
  }).join('');
}

function toggleConv(id) {
  const item = document.getElementById(`ci-${id}`);
  if (!item) return;
  const chat = item.querySelector('.conv-chat');
  if (!chat) return;
  const aberto = chat.style.display === 'block';
  // Fecha todas
  document.querySelectorAll('.conv-chat').forEach(e => e.style.display = 'none');
  _conversaAbertaId = null;
  _conversaAbertaMsgs = null;
  if (!aberto) {
    chat.style.display = 'block';
    _conversaAbertaId = id;
    const mc = document.getElementById(`msgs-${id}`);
    if (mc) { mc.scrollTop = mc.scrollHeight; _conversaAbertaMsgs = mc.innerHTML; }
  }
}

async function renderRenovacoes() {
  const ubsEnc = enc(U.ubs);
  const [alertas, pacientes] = await Promise.all([
    sb(`farmabot_alertas_renovacao?ubs_nome=eq.${ubsEnc}&order=data_alerta.desc&limit=50`),
    sb(`farmabot_pacientes?ubs_nome=eq.${ubsEnc}&select=id,nome,medicamentos`)
  ]);

  // Busca também receitas vencendo diretamente dos pacientes (sem esperar o alerta do servidor)
  const hoje = new Date();
  const vencendoLocal = [];
  (Array.isArray(pacientes) ? pacientes : []).forEach(p => {
    (p.medicamentos||[]).forEach(m => {
      if (!m.data_prescricao) return;
      const dp = new Date(m.data_prescricao);
      const dias = Math.floor((hoje - dp) / (1000 * 60 * 60 * 24));
      const dv = new Date(m.data_prescricao);
      dv.setMonth(dv.getMonth() + 6);
      if (dias >= 150) {
        vencendoLocal.push({
          paciente: p.nome,
          medicamento: m.nome,
          dias,
          vencimento: dv.toLocaleDateString('pt-BR'),
          vencida: dias > 180
        });
      }
    });
  });

  // Atualiza badge
  const totalPendente = vencendoLocal.length;
  const badge = document.getElementById('badge-renov');
  if (badge) { badge.textContent = totalPendente; badge.style.display = totalPendente > 0 ? '' : 'none'; }

  document.getElementById('main-content').innerHTML = `
    <div class="sec-titulo">📋 Renovação de receitas</div>

    ${vencendoLocal.length ? `
    <div class="card">
      <div class="card-tit">
        ⚠️ Receitas vencendo ou vencidas
        <span class="badge ${vencendoLocal.some(v=>v.vencida) ? 'br' : 'ba'}">${vencendoLocal.length} medicamento(s)</span>
      </div>
      ${vencendoLocal.map(v=>`
        <div class="il">
          <div class="av ${v.vencida ? 'av-r' : 'av-a'}">${v.vencida ? '❌' : '⏰'}</div>
          <div class="ii">
            <div class="in">${v.paciente}</div>
            <div class="is">${v.medicamento} · ${v.vencida ? `<span style="color:var(--vermelho);font-weight:600">Receita vencida há ${v.dias - 180} dia(s)</span>` : `<span style="color:var(--ambar);font-weight:600">Vence em ${v.vencimento} (${180 - v.dias} dia(s))</span>`}</div>
          </div>
          <span class="badge ${v.vencida ? 'br' : 'ba'}">${v.vencida ? 'Vencida' : 'Vencendo'}</span>
        </div>`).join('')}
    </div>` : `
    <div class="card">
      <div class="vazia"><em>✅</em>Nenhuma receita vencendo nos próximos 30 dias</div>
    </div>`}

    <div class="card">
      <div class="card-tit">📬 Histórico de alertas enviados</div>
      ${Array.isArray(alertas) && alertas.length ? alertas.map(a=>`
        <div class="il">
          <div class="av av-v">📋</div>
          <div class="ii">
            <div class="in">${a.paciente_nome}</div>
            <div class="is">${(a.medicamentos||[]).join(', ')} · Alerta em ${new Date(a.data_alerta).toLocaleDateString('pt-BR')}</div>
          </div>
          <span class="badge ${a.status==='pendente'?'ba':'bv'}">${a.status}</span>
        </div>`).join('') : '<div class="vazia"><em>📬</em>Nenhum alerta enviado ainda</div>'}
    </div>`;
}

async function vincularFamilia(btn) {
  const pac1 = document.getElementById('fam-pac1').value;
  const pac2 = document.getElementById('fam-pac2').value;
  const relacao = document.getElementById('fam-relacao').value;
  if (!pac1 || !pac2) { toast('Selecione os dois pacientes', 'err'); return; }
  if (pac1 === pac2) { toast('Selecione pacientes diferentes', 'err'); return; }

  setBtnLoad(btn, true);
  try {
    const r = await fetch(`${BACKEND}/familia`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': AT },
      body: JSON.stringify({ paciente_id: pac1, familiar_id: pac2, relacao })
    });
    const d = await r.json();
    if (d.ok) {
      toast('✅ Vínculo criado! Analisando interações...');
      await verFamiliaCompleta(pac1);
    } else toast(d.erro || 'Erro', 'err');
  } catch(e) { toast('Erro de conexão', 'err'); }
  setBtnLoad(btn, false);
}

async function verFamiliaCompleta(pacienteId) {
  const el = document.getElementById('familia-resultado');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--texto-ter)"><span class="spin" style="border-color:rgba(0,0,0,.1);border-top-color:var(--azul)"></span> Analisando família...</div>';

  try {
    // Busca vínculos
    const r = await fetch(`${BACKEND}/familia/${pacienteId}`, {
      headers: { 'x-admin-token': AT }
    });
    const d = await r.json();
    const vinculos = d.vinculos || [];

    if (!vinculos.length) {
      el.innerHTML = '<div class="card"><div class="vazia"><em>👨‍👩‍👧</em>Nenhum familiar vinculado ainda</div></div>';
      return;
    }

    // Busca dados de todos os membros da família
    const ids = new Set([pacienteId]);
    vinculos.forEach(v => { ids.add(v.paciente_id); ids.add(v.familiar_id); });
    const membros = await sb(`farmabot_pacientes?id=in.(${Array.from(ids).join(',')})&select=id,nome,medicamentos,condicoes`);

    // Cruza todos os medicamentos
    const todosMeds = [];
    (Array.isArray(membros) ? membros : []).forEach(m => {
      (m.medicamentos||[]).forEach(med => {
        todosMeds.push({ paciente: m.nome, med: med.nome });
      });
    });

    // Checa interações cruzadas
    const interacoesCruzadas = [];
    for (let i = 0; i < todosMeds.length; i++) {
      for (let j = i + 1; j < todosMeds.length; j++) {
        if (todosMeds[i].paciente === todosMeds[j].paciente) continue; // mesma pessoa
        const ints = checarInteracoes(todosMeds[i].med.toUpperCase(), [todosMeds[j].med.toUpperCase()]);
        ints.forEach(int => {
          interacoesCruzadas.push(`⚠ *${todosMeds[i].paciente}* (${todosMeds[i].med}) + *${todosMeds[j].paciente}* (${todosMeds[j].med}): ${int}`);
        });
      }
    }

    el.innerHTML = `
      <div class="card" style="margin-top:16px">
        <div class="card-tit">👨‍👩‍👧 Prescrição da família</div>
        ${(Array.isArray(membros) ? membros : []).map(m=>`
          <div style="border:1px solid var(--borda);border-radius:var(--r);padding:12px;margin-bottom:10px">
            <div style="font-weight:700;margin-bottom:6px">👤 ${m.nome}</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${(m.medicamentos||[]).map(med=>`<span class="med-chip ${med.beers_alerta?'med-chip-r':''}">${med.nome}</span>`).join('')||'<span style="color:var(--texto-ter);font-size:12px">Sem medicamentos</span>'}
            </div>
          </div>`).join('')}

        ${interacoesCruzadas.length ? `
          <div class="interacao-box" style="margin-top:12px">
            <div class="interacao-tit">⚠️ Interações entre membros da família (${interacoesCruzadas.length})</div>
            ${interacoesCruzadas.map(i=>`<div class="interacao-li" style="margin-bottom:6px">${i}</div>`).join('')}
            <div style="font-size:11px;color:var(--ambar);margin-top:8px">Atenção: membros da mesma casa podem usar os medicamentos uns dos outros. Oriente sobre os riscos.</div>
          </div>` : `
          <div style="background:var(--verde-bg);border:1px solid var(--verde-borda);border-radius:var(--r);padding:10px;margin-top:12px;font-size:12px;color:var(--verde)">
            ✅ Nenhuma interação medicamentosa entre os membros da família detectada
          </div>`}
      </div>`;
  } catch(e) { el.innerHTML = '<div class="card"><div class="vazia"><em>⚠️</em>Erro ao carregar dados da família</div></div>'; }
}

async function renderQueixas() {
  const ubsEnc = enc(U.ubs);
  const data = await sb(`farmabot_queixas?ubs_nome=ilike.${ubsEnc}&order=criado_em.desc&limit=100`);
  const lista = Array.isArray(data) ? data : [];
  const pendentes = lista.filter(q => q.status === 'pendente');

  document.getElementById('main-content').innerHTML = `
    <div class="sec-titulo" style="justify-content:space-between">
      <span>⚠️ Queixas e Reações adversas</span>
      <button class="btn btn-v btn-sm" onclick="abrirRegistrarQueixa()">➕ Registrar queixa</button>
    </div>

    <div class="tabs">
      <button class="tab ativa" id="tab-q-pend" onclick="filtrarQueixas('pendente')">⏳ Pendentes <span class="nav-badge r">${pendentes.length}</span></button>
      <button class="tab" id="tab-q-todas" onclick="filtrarQueixas('todas')">Todas (${lista.length})</button>
    </div>

    <div id="lista-queixas">${renderListaQueixas(pendentes)}</div>`;

  window._queixasTodas = lista;
  window._queixasPend = pendentes;
}

function filtrarQueixas(tipo) {
  document.getElementById('tab-q-pend').classList.toggle('ativa', tipo==='pendente');
  document.getElementById('tab-q-todas').classList.toggle('ativa', tipo==='todas');
  document.getElementById('lista-queixas').innerHTML = renderListaQueixas(
    tipo==='pendente' ? window._queixasPend : window._queixasTodas
  );
}

function renderListaQueixas(lista) {
  if (!lista.length) return '<div class="vazia"><em>✅</em>Nenhuma queixa registrada</div>';
  // Armazena queixas globalmente para acesso pelo botão Ver
  window._queixasCache = lista;
  return lista.map((q, idx) => {
    const corGrav = q.gravidade==='grave' ? 'vermelho' : q.gravidade==='moderada' ? 'ambar' : 'cinza';
    return `<div class="il">
      <div class="av av-${corGrav==='vermelho'?'r':corGrav==='ambar'?'a':'v'}">⚠️</div>
      <div class="ii">
        <div class="in">${q.paciente_nome} <span class="badge b${corGrav[0]}">${q.gravidade||'moderada'}</span></div>
        <div class="is">${q.descricao?.substring(0,80)}${q.descricao?.length>80?'...':''}</div>
        <div class="is">${q.medicamento?`💊 ${q.medicamento} · `:''} ${q.data_registro||''}</div>
      </div>
      <div class="ia">
        ${q.status==='pendente' ? `<button class="btn btn-v btn-sm" onclick="resolverQueixa('${q.id}')">✅ Resolver</button>` : '<span class="badge bv">resolvida</span>'}
        <button class="btn btn-az btn-sm" onclick="verQueixaIdx(${idx})">Ver</button>
      </div>
    </div>`;
  }).join('');
}

function verQueixaIdx(idx) {
  const q = window._queixasCache?.[idx];
  if (!q) return;
  verQueixa(q);
}

async function salvarQueixa(btn) {
  const nome = document.getElementById('q-paciente').value.trim();
  const med = document.getElementById('q-med').value.trim();
  const desc = document.getElementById('q-desc').value.trim();
  const grav = document.getElementById('q-grav').value;
  if (!desc) { toast('Descreva a queixa', 'err'); return; }

  setBtnLoad(btn, true);
  const pac = (window._pacientesQueixa||[]).find(p => p.nome === nome);

  try {
    const pac = (window._pacientesQueixa||[]).find(p => p.nome === nome);
    const payload = {
      paciente_id: pac?.id || null,
      paciente_nome: nome || 'Não identificado',
      telefone: pac?.telefone || null,
      ubs_nome: U.ubs,
      descricao: desc,
      medicamento: med || null,
      gravidade: grav,
      status: 'pendente',
      data_registro: new Date().toLocaleDateString('en-CA')
    };

    const d = await sb('farmabot_queixas', {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    if (!d?.message) {
      toast(grav==='grave' ? '🚨 Queixa grave registrada!' : '✅ Queixa registrada!');
      fecharModal();
      await renderQueixas();
      setTimeout(() => filtrarQueixas('todas'), 100);
    } else toast(d.message || 'Erro ao registrar', 'err');
  } catch(e) { toast('Erro de conexão', 'err'); }
  setBtnLoad(btn, false);
}

async function resolverQueixa(id) {
  try {
    await sb(`farmabot_queixas?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'resolvida' })
    });
    toast('✅ Queixa marcada como resolvida');
    renderQueixas();
  } catch(e) { toast('Erro', 'err'); }
}

function verQueixa(q) {
  const corGrav = q.gravidade==='grave' ? 'vermelho' : q.gravidade==='moderada' ? 'ambar' : 'cinza';
  abrirModal(`⚠️ Queixa — ${q.paciente_nome}`, `

                return `<tr style="border-bottom:1px solid var(--borda)">

                  <td style="text-align:center;padding:10px 8px"><span style="background:var(--verde-bg);color:var(--verde);padding:2px 8px;border-radius:20px;font-weight:700">${u.pacientes}</span></td>
                  <td style="text-align:center;padding:10px 8px">${u.beers > 0 ? `<span style="background:var(--ambar-bg);color:var(--ambar);padding:2px 8px;border-radius:20px;font-weight:700">${u.beers}</span>` : '<span style="color:var(--texto-ter)">—</span>'}</td>
                  <td style="text-align:center;padding:10px 8px">${u.renovacoes > 0 ? `<span style="background:var(--vermelho-bg);color:var(--vermelho);padding:2px 8px;border-radius:20px;font-weight:700">${u.renovacoes}</span>` : '<span style="color:var(--texto-ter)">—</span>'}</td>
                  <td style="text-align:center;padding:10px 8px">${u.conversas > 0 ? `<span style="background:var(--roxo-bg);color:var(--roxo);padding:2px 8px;border-radius:20px;font-weight:700">${u.conversas}</span>` : '<span style="color:var(--texto-ter)">—</span>'}</td>
                  <td style="text-align:center;padding:10px 8px">${u.queixas > 0 ? `<span style="background:var(--vermelho-bg);color:var(--vermelho);padding:2px 8px;border-radius:20px;font-weight:700">${u.queixas}</span>` : '<span style="color:var(--texto-ter)">—</span>'}</td>
                  <td style="padding:10px 8px;min-width:120px">
                    <div style="background:var(--cinza-bg);border-radius:20px;height:8px;overflow:hidden">
                      <div style="background:var(--${nivel});height:100%;width:${pct}%;border-radius:20px;transition:width .5s"></div>
                    </div>
                    <div style="font-size:10px;color:var(--texto-ter);margin-top:3px">${pct}% do máximo</div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Legenda -->
      <div class="card" style="margin-top:0">
        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px">
          <span>🟢 Verde — sem alertas críticos</span>
          <span>🟡 Amarelo — Beers ou renovações pendentes</span>
          <span>🔴 Vermelho — queixas ou múltiplos alertas</span>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div class="sec-titulo">🗺️ Mapa de cobertura</div>
      <div class="card"><div class="vazia"><em>⚠️</em>Erro ao carregar dados de cobertura</div></div>`;
  }
}

async function verificarPendencias() {
  try {
    const path = U.perfil==='gestor'
      ? 'farmabot_conversas?pendente=eq.true&select=id'
      : `farmabot_conversas?unidade=eq.${enc(U.ubs)}&pendente=eq.true&select=id`;
    const d = await sb(path);
    atualizarBadgeConv(Array.isArray(d) ? d.length : 0);
  } catch{}
}

// ID da conversa atualmente aberta no painel
let _conversaAbertaId = null;
let _conversaAbertaMsgs = null;

function abrirModal(titulo, html) {
  document.getElementById('modal-body').innerHTML=`<div class="modal-tit">${titulo}</div>${html}`;
  document.getElementById('overlay').classList.add('aberto');
}
function fecharModal(){document.getElementById('overlay').classList.remove('aberto');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)fecharModal();});

function setBtnLoad(btn, loading) {
  if(loading){btn._orig=btn.innerHTML;btn.innerHTML='<span class="spin"></span> Salvando...';btn.disabled=true;}
  else{btn.innerHTML=btn._orig||btn.innerHTML;btn.disabled=false;}
}

function toast(msg,tipo='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`show ${tipo}`;
  setTimeout(()=>t.className='',3000);
}
</script>
